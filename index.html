<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Kerja S3 KA05</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f4f6f9; padding: 30px 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; font-weight: 600; }
        .login-container { max-width: 400px; margin: 50px auto; background: #fff; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center; }
        .login-container h3 { color: #2c3e50; margin-bottom: 20px; }
        input[type="text"], input[type="password"], input[type="time"], input[type="date"], select { padding: 12px; border: 1px solid #ced4da; border-radius: 6px; width: 100%; outline: none; margin-top: 5px; font-size: 1rem; background-color: #fff; }
        .btn-login { width: 100%; padding: 12px; background-color: #0288d1; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 15px; }
        .form-container { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #e9ecef; display: none; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.85rem; font-weight: 600; color: #495057; }
        .btn-submit { width: 100%; padding: 12px; background-color: #2a9d8f; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .btn-submit:disabled { background-color: #cccccc; cursor: not-allowed; }
        .filter-box { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .filter-box .form-group { flex: 1; min-width: 150px; }
        .btn-reset { padding: 10px 15px; background-color: #6c757d; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.95rem; }
        .table-responsive { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        th { background-color: #343a40; color: white; padding: 12px 10px; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
        td { padding: 12px 10px; border-bottom: 1px solid #dee2e6; vertical-align: middle; }
        tr.selesai td { text-decoration: line-through; color: #adb5bd; background-color: #f8f9fa; }
        .badge-waktu { background-color: #e2eafc; color: #4a4e69; padding: 4px 8px; border-radius: 4px; font-weight: 600; font-size: 0.85rem; display: inline-block; }
        .badge-rutin { background-color: #ffe3e3; color: #c91818; padding: 4px 8px; border-radius: 4px; font-weight: 600; font-size: 0.85rem; display: inline-block; }
        .aksi-btn { display: flex; gap: 5px; }
        .btn-table { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.85rem; color: white; }
        .selesai-btn { background-color: #0288d1; }
        .hapus-btn { background-color: #e63946; }
        .btn-logout { background-color: #e63946; padding: 10px 15px; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.95rem; }
        .no-data { text-align: center; padding: 20px; color: #6c757d; font-style: italic; }
        .badge-role { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; color: white; margin-left: 10px; }
        .role-admin { background-color: #e63946; }
        .role-user { background-color: #0288d1; }
        .loading-db { text-align: center; color: #0288d1; font-weight: bold; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div id="sectionLogin" class="login-container">
    <h3>🔒 Login Sistem Agenda Kerja</h3>
    <div style="text-align: left; margin-bottom: 15px;">
        <label style="font-size: 0.85rem; font-weight: bold;">Username</label>
        <input type="text" id="usernameInput" placeholder="Username...">
    </div>
    <div style="text-align: left; margin-bottom: 10px;">
        <label style="font-size: 0.85rem; font-weight: bold;">Password</label>
        <input type="password" id="passwordInput" placeholder="Password..." onkeypress="cekEnter(event)">
    </div>
    <button class="btn-login" onclick="prosesLogin()">Masuk Sistem</button>
</div>

<div id="kontenUtama" class="container" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2>📝 Agenda Kerja <span id="displayRole"></span></h2>
        <button class="btn-logout" onclick="prosesLogout()">🔒 Keluar</button>
    </div>

    <div id="loadingStatus" class="loading-db">Memproses koneksi database cloud...</div>
    
    <div id="managerUserContainer" class="form-container" style="background: #edf2f7; border-color: #cbd5e0;">
        <h4 style="margin-bottom: 10px; color: #2d3748;">👥 Pengelolaan Akun Pengamat (Maks 15 User)</h4>
        <div class="form-grid" style="grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));">
            <input type="text" id="newUsername" placeholder="Username baru...">
            <input type="text" id="newPassword" placeholder="Password baru...">
            <button id="btnTambahUser" class="btn-submit" onclick="tambahUserBaru()" style="background-color: #4a5568;">+ Daftarkan User (<span id="userCount">0</span>/15)</button>
        </div>
        <div id="listUserTerdaftar" style="font-size: 0.85rem; margin-top: 10px; display: flex; flex-wrap: wrap; gap: 10px;"></div>
    </div>
    
    <div id="formInputAgenda" class="form-container">
        <div class="form-grid">
            <div class="form-group">
                <label>Jenis Agenda</label>
                <select id="jenisAgenda" onchange="aturFormInput()">
                    <option value="sekali">Sekali Jalan (Pakai Tanggal)</option>
                    <option value="rutin">Rutin Mingguan (Pakai Hari)</option>
                </select>
            </div>
            <div class="form-group" id="groupTanggal"><label>Tanggal Berjalan</label><input type="date" id="tanggalInput"></div>
            <div class="form-group" id="groupHariRutin" style="display: none;">
                <label>Pilih Hari Rutin</label>
                <select id="hariRutinInput">
                    <option value="Senin">Setiap Senin</option><option value="Selasa">Setiap Selasa</option><option value="Rabu">Setiap Rabu</option><option value="Kamis">Setiap Kamis</option><option value="Jumat">Setiap Jumat</option><option value="Sabtu">Setiap Sabtu</option><option value="Minggu">Setiap Minggu</option>
                </select>
            </div>
            <div class="form-group"><label>Pukul</label><input type="time" id="jamInput"></div>
            <div class="form-group"><label>Kegiatan</label><input type="text" id="kegiatanInput" placeholder="Nama kegiatan..."></div>
            <div class="form-group"><label>Pemateri</label><input type="text" id="pemateriInput" placeholder="Pemateri..."></div>
            <div class="form-group"><label>Lokasi</label><input type="text" id="lokasiInput" placeholder="Lokasi..."></div>
        </div>
        <button id="btnSimpanAgenda" class="btn-submit" onclick="tambahAgenda()">Simpan ke Agenda Kerja</button>
    </div>

    <div class="filter-box">
        <div class="form-group"><label style="font-size: 0.85rem; font-weight: bold;">Dari Tanggal</label><input type="date" id="filterMulai" onchange="muatAgenda()"></div>
        <div class="form-group"><label style="font-size: 0.85rem; font-weight: bold;">Sampai Tanggal</label><input type="date" id="filterSampai" onchange="muatAgenda()"></div>
        <div style="display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap;">
            <button class="btn-reset" onclick="resetFilter()">Reset Filter</button>
            <button onclick="exportKeExcel()" style="padding: 10px 15px; background-color: #217346; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">📊 Export Excel</button>
            <button id="btnImport" onclick="pilihFileImport()" style="padding: 10px 15px; background-color: #0288d1; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; display: none;">📥 Import Excel</button>
            <input type="file" id="inputFileExcel" accept=".htm, .html" style="display: none;" onchange="prosesImportExcel(this)">
        </div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">Tanggal</th><th style="width: 12%;">Hari</th><th style="width: 10%;">Pukul</th><th style="width: 28%;">Kegiatan</th><th style="width: 15%;">Pemateri</th><th style="width: 10%;">Lokasi</th><th id="thAksi" style="width: 10%; text-align: center; display: none;">Aksi</th>
                </tr>
            </thead>
            <tbody id="daftarAgenda"></tbody>
        </table>
    </div>
</div>

<script>
    // ⚠️ MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
    const API_URL = "https://script.google.com/macros/s/AKfycbwe3GO8LuSTE9HF3sMNDqrRYGqGU3_3sMWfhEbdMAOhbz63QTYG3hODNG-pwN5qfonE/exec";
    
    const ADMIN_USER = "admin";
    const ADMIN_PASS = "Y!TR04213";

    // Global memory cache agar filter lokal tetap responsif super cepat
    window.DATABASE_CLOUD_AGENDA = [];
    window.DATABASE_CLOUD_USERS = [];

    const sectionLogin = document.getElementById('sectionLogin');
    const kontenUtama = document.getElementById('kontenUtama');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const loadingStatus = document.getElementById('loadingStatus');
    const managerUserContainer = document.getElementById('managerUserContainer');
    const formInputAgenda = document.getElementById('formInputAgenda');
    const btnImport = document.getElementById('btnImport');
    const thAksi = document.getElementById('thAksi');
    const displayRole = document.getElementById('displayRole');
    const userCount = document.getElementById('userCount');
    const listUserTerdaftar = document.getElementById('listUserTerdaftar');
    const btnSimpanAgenda = document.getElementById('btnSimpanAgenda');
    const btnTambahUser = document.getElementById('btnTambahUser');

    const jenisAgenda = document.getElementById('jenisAgenda');
    const groupTanggal = document.getElementById('groupTanggal');
    const groupHariRutin = document.getElementById('groupHariRutin');
    const tanggalInput = document.getElementById('tanggalInput');
    const hariRutinInput = document.getElementById('hariRutinInput');
    const jamInput = document.getElementById('jamInput');
    const kegiatanInput = document.getElementById('kegiatanInput');
    const pemateriInput = document.getElementById('pemateriInput');
    const lokasiInput = document.getElementById('lokasiInput');
    const filterMulai = document.getElementById('filterMulai');
    const filterSampai = document.getElementById('filterSampai');
    const daftarAgenda = document.getElementById('daftarAgenda');

    document.addEventListener("DOMContentLoaded", tarikDataDariCloud);

    function setLoadingMode(status) {
        loadingStatus.style.display = status ? "block" : "none";
        btnSimpanAgenda.disabled = status;
        btnTambahUser.disabled = status;
    }

    // Mengambil data terpadu (GET via JSONP untuk bypass CORS lokal/HP)
    function tarikDataDariCloud() {
        setLoadingMode(true);
        const scriptLama = document.getElementById('jsonpDatabaseScript');
        if (scriptLama) scriptLama.remove();

        window.handleCloudPayload = function(payload) {
            window.DATABASE_CLOUD_AGENDA = payload.agendas;
            window.DATABASE_CLOUD_USERS = payload.users;
            setLoadingMode(false);
            periksaStatusLogin();
        };

        const script = document.createElement('script');
        script.id = 'jsonpDatabaseScript';
        script.src = `${API_URL}?callback=handleCloudPayload&_=${Date.now()}`;
        script.onerror = function() {
            alert("Koneksi Cloud Gagal! Periksa setelan web app URL Google Sheets Anda.");
            setLoadingMode(false);
        };
        document.body.appendChild(script);
    }
    // Mengirim data perubahan (POST) ke Google Sheets secara background
    async function kirimDataKeCloud(payload) {
        setLoadingMode(true);
        try {
            await fetch(API_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
            setTimeout(tarikDataDariCloud, 1500); // Beri jeda agar Google Sheets selesai menulis row
        } catch (e) {
            alert("Gagal memperbarui database cloud!");
            setLoadingMode(false);
        }
    }

    function periksaStatusLogin() {
        const currentRole = localStorage.getItem("session_role");
        if (currentRole === "admin") {
            sectionLogin.style.display = "none"; kontenUtama.style.display = "block";
            managerUserContainer.style.display = "block"; formInputAgenda.style.display = "block";
            btnImport.style.display = "block"; thAksi.style.display = "table-cell";
            displayRole.innerHTML = `<span class="badge-role role-admin">Admin</span>`;
            renderDaftarUser();
        } else if (currentRole === "user") {
            sectionLogin.style.display = "none"; kontenUtama.style.display = "block";
            managerUserContainer.style.display = "none"; formInputAgenda.style.display = "none";
            btnImport.style.display = "none"; thAksi.style.display = "none";
            displayRole.innerHTML = `<span class="badge-role role-user">User / Pengamat</span>`;
        } else {
            sectionLogin.style.display = "block"; kontenUtama.style.display = "none";
        }
        muatAgenda();
    }

        function prosesLogin() {
        const inputUser = usernameInput.value.trim();
        const inputPass = passwordInput.value;

        // 1. KUNCI UTAMA: Validasi Akun Master Admin (Selalu prioritaskan ini tanpa memandang koneksi sheets)
        if (inputUser === ADMIN_USER && inputPass === ADMIN_PASS) {
            localStorage.setItem("session_role", "admin");
            usernameInput.value = ""; 
            passwordInput.value = "";
            periksaStatusLogin(); 
            return; // Hentikan fungsi di sini karena login admin sudah sukses
        }

        // 2. Validasi Akun Pengamat dari Google Sheets (Hanya jika bukan kata 'admin')
        if (window.DATABASE_CLOUD_USERS && window.DATABASE_CLOUD_USERS.length > 0) {
            const userCocok = window.DATABASE_CLOUD_USERS.find(u => u.username.trim() === inputUser && u.password.toString() === inputPass.toString());
            if (userCocok) {
                localStorage.setItem("session_role", "user");
                usernameInput.value = ""; 
                passwordInput.value = "";
                periksaStatusLogin();
                return;
            }
        }

        // Jika semua pengecekan di atas gagal, tampilkan peringatan salah
        alert("Username atau Password salah / Akun tidak terdaftar!");
    }

        function prosesLogout() {
        // 1. Bersihkan status sesi login saja
        localStorage.removeItem("session_role");
        
        // 2. Kosongkan cache database di memori agar aman saat berganti akun
        window.DATABASE_CLOUD_AGENDA = [];
        window.DATABASE_CLOUD_USERS = [];
        
        // 3. Paksa website menarik data ulang murni dari Google Sheets sebelum memunculkan kotak login
        tarikDataDariCloud();
    }

    function periksaStatusLogin() {
        const currentRole = localStorage.getItem("session_role");
        
        if (currentRole === "admin") {
            sectionLogin.style.display = "none"; 
            kontenUtama.style.display = "block";
            managerUserContainer.style.display = "block"; 
            formInputAgenda.style.display = "block";
            btnImport.style.display = "block"; 
            thAksi.style.display = "table-cell";
            displayRole.innerHTML = `<span class="badge-role role-admin">Admin</span>`;
            renderDaftarUser();
        } else if (currentRole === "user") {
            sectionLogin.style.display = "none"; 
            kontenUtama.style.display = "block";
            managerUserContainer.style.display = "none"; 
            formInputAgenda.style.display = "none";
            btnImport.style.display = "none"; 
            thAksi.style.display = "none";
            displayRole.innerHTML = `<span class="badge-role role-user">User / Pengamat</span>`;
        } else {
            // JIKA LOGOUT: Tampilkan kotak login, bersihkan inputan lama, dan sembunyikan tabel agenda demi privasi
            sectionLogin.style.display = "block"; 
            kontenUtama.style.display = "none";
            
            // Pengaman pengosongan form login agar tidak macet di HP
            if(document.getElementById('usernameInput')) document.getElementById('usernameInput').value = "";
            if(document.getElementById('passwordInput')) document.getElementById('passwordInput').value = "";
        }
        muatAgenda();
    }

    function cekEnter(e) { if (e.key === "Enter") prosesLogin(); }

    function renderDaftarUser() {
        userCount.innerText = window.DATABASE_CLOUD_USERS.length;
        listUserTerdaftar.innerHTML = "";
        window.DATABASE_CLOUD_USERS.forEach(u => {
            listUserTerdaftar.innerHTML += `
                <span style="background:#edf2f7; padding:4px 8px; border-radius:4px; border:1px solid #cbd5e0; font-size:0.85rem;">
                    👤 ${u.username} <b style="color:#e63946; cursor:pointer; margin-left:5px;" onclick="hapusUser('${u.username}')">X</b>
                </span>`;
        });
    }

    function tambahUserBaru() {
        const newU = document.getElementById('newUsername').value.trim();
        const newP = document.getElementById('newPassword').value.trim();
        if(newU === "" || newP === "") return;
        if(window.DATABASE_CLOUD_USERS.length >= 15) { alert("Kuota maksimal pengamat penuh (15 user)!"); return; }
        if(window.DATABASE_CLOUD_USERS.some(u => u.username === newU) || newU === ADMIN_USER) { alert("Username sudah terpakai!"); return; }

        document.getElementById('newUsername').value = ""; document.getElementById('newPassword').value = "";
        kirimDataKeCloud({ aksi: "tambah_user", username: newU, password: newP });
    }

    function hapusUser(usernameTarget) {
        if(!confirm(`Hapus hak akses user [${usernameTarget}]?`)) return;
        kirimDataKeCloud({ aksi: "hapus_user", username: usernameTarget });
    }

    function aturFormInput() {
        groupTanggal.style.display = jenisAgenda.value === 'rutin' ? 'none' : 'block';
        groupHariRutin.style.display = jenisAgenda.value === 'rutin' ? 'block' : 'none';
    }

    function muatAgenda() {
        // Ambil data dari memori cloud, jika kosong buat array kosong agar tidak crash
        let agendas = window.DATABASE_CLOUD_AGENDA ? JSON.parse(JSON.stringify(window.DATABASE_CLOUD_AGENDA)) : [];
        const tglMulaiVal = filterMulai.value;
        const tglSampaiVal = filterSampai.value;
        const hariIndo = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        
        // 1. Bersihkan data sampah/kosong yang datang dari Google Sheets
        agendas = agendas.filter(agenda => {
            return agenda && agenda.kegiatan && agenda.kegiatan.trim() !== "" && agenda.kegiatan !== "-";
        });

        agendas = agendas.map(agenda => {
            // PERBAIKAN FATAL FORMAT JAM: Koreksi pemecahan array indeks string yang benar
            if (agenda.jam && agenda.jam.toString().includes("T")) {
                let sisaWaktu = agenda.jam.toString().split("T"); // [1899-12-30, 06:52:48.000Z]
                if (sisaWaktu.length === 2) {
                    let komponenJam = sisaWaktu[1].split(":"); // Memecah string waktu murni [06, 52, 48.000Z]
                    if (komponenJam.length >= 2) {
                        agenda.jam = `${komponenJam[0]}:${komponenJam[1]}`; // Hasil: 06:52
                    }
                }
            }

            if (agenda.isRutin) {
                const hariIni = new Date(); hariIni.setHours(0,0,0,0);
                let selisihHari = hariIndo.indexOf(agenda.hariRutin) - hariIni.getDay();
                if (selisihHari < 0) selisihHari += 7;
                const tanggalTarget = new Date(hariIni); tanggalTarget.setDate(hariIni.getDate() + selisihHari);
                agenda.tanggalUrutDinamis = `${tanggalTarget.getFullYear()}-${String(tanggalTarget.getMonth() + 1).padStart(2, '0')}-${String(tanggalTarget.getDate()).padStart(2, '0')}`;
            } else {
                if (agenda.tanggal && agenda.tanggal.toString().includes("/")) {
                    const p = agenda.tanggal.split("/"); agenda.tanggalUrutDinamis = `${p[2]}-${p[1]}-${p[0]}`;
                } else if (agenda.tanggal && agenda.tanggal.toString().includes("T")) {
                    agenda.tanggalUrutDinamis = agenda.tanggal.split("T")[0];
                } else {
                    agenda.tanggalUrutDinamis = agenda.tanggal;
                }
            }
            return agenda;
        });

        // 2. Filter Berdasarkan Rentang Tanggal Kalender
        if (tglMulaiVal !== "" || tglSampaiVal !== "") {
            agendas = agendas.filter(agenda => {
                if (!agenda.tanggalUrutDinamis) return false;
                const tglParts = agenda.tanggalUrutDinamis.split("-");
                if (tglParts.length !== 3) return false;
                const tanggalAgenda = new Date(parseInt(tglParts[0]), parseInt(tglParts[1]) - 1, parseInt(tglParts[2]));
                
                if (tglMulaiVal !== "") {
                    const m = tglMulaiVal.split("-");
                    if (tanggalAgenda < new Date(parseInt(m[0]), parseInt(m[1]) - 1, parseInt(m[2]))) return false;
                }
                if (tglSampaiVal !== "") {
                    const s = tglSampaiVal.split("-");
                    if (tanggalAgenda > new Date(parseInt(s[0]), parseInt(s[1]) - 1, parseInt(s[2]))) return false;
                }
                return true;
            });
        }

        // 3. Pengurutan Data Kronologis Kalender
        agendas.sort((a, b) => {
            const urutanA = new Date(a.tanggalUrutDinamis);
            const urutanB = new Date(b.tanggalUrutDinamis);
            if (urutanA - urutanB !== 0) return urutanA - urutanB;
            return (a.jam || "").toString().localeCompare((b.jam || "").toString());
        });

        tampilkanAgenda(agendas);
    }


    function tampilkanAgenda(agendas) {
        daftarAgenda.innerHTML = '';
        if(agendas.length === 0) {
            daftarAgenda.innerHTML = `<tr><td colspan="7" class="no-data">Tidak ada agenda ditemukan.</td></tr>`; return;
        }
        const isAdmin = localStorage.getItem("session_role") === "admin";

        agendas.forEach(function(agenda) {
            const tr = document.createElement('tr');
            if(agenda.selesai) tr.classList.add('selesai');

            // Ambil data tanggal bersih (potong jika ada sisa timestamp ISO dari Google Sheets)
            let tanggalMentah = agenda.tanggal;
            if(tanggalMentah && tanggalMentah.includes("T")) {
                tanggalMentah = tanggalMentah.split("T")[0];
            }

            let kolomTanggal = agenda.isRutin ? `<span class="badge-rutin">🔄 Rutin</span>` : `<span class="badge-waktu">${formatTanggalIndo(tanggalMentah)}</span>`;
            let kolomHari = agenda.isRutin ? `<strong>${agenda.hariRutin}</strong>` : `<strong>${dapatkanNamaHari(tanggalMentah)}</strong>`;

            let aksiButtonHtml = isAdmin ? `
                <td class="aksi-kolom"><div class="aksi-btn">
                    <button class="btn-table selesai-btn" onclick="toggleSelesai('${agenda.id}')">✔️</button>
                    <button class="btn-table hapus-btn" onclick="hapusAgenda('${agenda.id}')">X</button>
                </div></td>` : '';

            tr.innerHTML = `<td>${kolomTanggal}</td><td>${kolomHari}</td><td>⏰ ${agenda.jam || '-'}</td><td>${agenda.kegiatan}</td><td>👤 ${agenda.pemateri || '-'}</td><td>📍 ${agenda.lokasi || '-'}</td>${aksiButtonHtml}`;
            daftarAgenda.appendChild(tr);
        });
    }

        agendas.sort((a, b) => new Date(a.tanggalUrutDinamis) - new Date(b.tanggalUrutDinamis) || (a.jam || "").localeCompare(b.jam || ""));
        tampilkanAgenda(agendas);
    }
    function dapatkanNamaHari(tanggalTeks) {
        if (!tanggalTeks) return "-";
        const parts = tanggalTeks.includes("T") ? tanggalTeks.split("T")[0].split("-") : tanggalTeks.split("-");
        return ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"][new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2])).getDay()];
    }

    function formatTanggalIndo(tanggalTeks) {
        if (!tanggalTeks) return "-";
        const bersih = tanggalTeks.includes("T") ? tanggalTeks.split("T")[0] : tanggalTeks;
        const tgl = bersih.split("-");
        return `${tgl[2]}/${tgl[1]}/${tgl[0]}`;
    }
    function tampilkanAgenda(agendas) {
        daftarAgenda.innerHTML = '';
        if(agendas.length === 0) {
            daftarAgenda.innerHTML = `<tr><td colspan="7" class="no-data">Tidak ada agenda ditemukan.</td></tr>`; return;
        }
        const isAdmin = localStorage.getItem("session_role") === "admin";

        agendas.forEach(function(agenda) {
            const tr = document.createElement('tr');
            if(agenda.selesai) tr.classList.add('selesai');

            let kolomTanggal = agenda.isRutin ? `<span class="badge-rutin">🔄 Rutin</span>` : `<span class="badge-waktu">${formatTanggalIndo(agenda.tanggal)}</span>`;
            let kolomHari = agenda.isRutin ? `<strong>${agenda.hariRutin}</strong>` : `<strong>${dapatkanNamaHari(agenda.tanggal)}</strong>`;

            let aksiButtonHtml = isAdmin ? `
                <td class="aksi-kolom"><div class="aksi-btn">
                    <button class="btn-table selesai-btn" onclick="toggleSelesai('${agenda.id}')">✔️</button>
                    <button class="btn-table hapus-btn" onclick="hapusAgenda('${agenda.id}')">X</button>
                </div></td>` : '';

            tr.innerHTML = `<td>${kolomTanggal}</td><td>${kolomHari}</td><td>⏰ ${agenda.jam || '-'}</td><td>${agenda.kegiatan}</td><td>👤 ${agenda.pemateri || '-'}</td><td>📍 ${agenda.lokasi || '-'}</td>${aksiButtonHtml}`;
            daftarAgenda.appendChild(tr);
        });
    }

    function tambahAgenda() {
        const kegiatan = kegiatanInput.value;
        if (kegiatan.trim() === '' || (jenisAgenda.value === 'sekali' && tanggalInput.value === '')) { alert('Isi data wajib!'); return; }

        const idBaru = Date.now().toString();
        const isRutin = jenisAgenda.value === 'rutin';
        const tgl = isRutin ? '' : tanggalInput.value;
        const hari = isRutin ? hariRutinInput.value : '';
        const jam = jamInput.value; const pemateri = pemateriInput.value; const lokasi = lokasiInput.value;

        tanggalInput.value = ''; jamInput.value = ''; kegiatanInput.value = ''; pemateriInput.value = ''; lokasiInput.value = '';
        kirimDataKeCloud({ aksi: "tambah_agenda", id: idBaru, isRutin: isRutin, tanggal: tgl, hariRutin: hari, jam: jam, kegiatan: kegiatan, pemateri: pemateri, lokasi: lokasi });
    }

    function resetFilter() { filterMulai.value = ""; filterSampai.value = ""; muatAgenda(); }

    function toggleSelesai(id) { kirimDataKeCloud({ aksi: "toggle_agenda", id: id }); }
    function hapusAgenda(id) { if(confirm("Hapus agenda ini?")) kirimDataKeCloud({ aksi: "hapus_agenda", id: id }); }

    function exportKeExcel() {
        const tabelAgenda = document.querySelector("table"); if (!tabelAgenda) return;
        const klonTabel = tabelAgenda.cloneNode(true);
        klonTabel.querySelectorAll("tr").forEach(baris => {
            const teks = baris.innerText.toLowerCase();
            if (teks.includes("pukul") && teks.includes("kegiatan") && baris.parentElement.tagName === "TBODY") baris.remove();
            if (localStorage.getItem("session_role") === "admin" && baris.lastElementChild) baris.lastElementChild.remove();
        });
        const templateExcel = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://w3.org"><head><meta charset="UTF-8"><style>th { background-color: #343a40; color: #fff; font-weight: bold; border: 1px solid #000; } td { border: 1px solid #dee2e6; }</style></head><body>${klonTabel.outerHTML}</body></html>`;
        const dataBlob = new Blob([templateExcel], { type: "application/vnd.ms-excel" });
        const urlUnduh = URL.createObjectURL(dataBlob); const tautanUnduh = document.createElement("a"); tautanUnduh.href = urlUnduh; tautanUnduh.download = "Agenda_Kerja_Harian.xls";
        document.body.appendChild(tautanUnduh); tautanUnduh.click(); document.body.removeChild(tautanUnduh); URL.revokeObjectURL(urlUnduh);
    }

    function pilihFileImport() { document.getElementById('inputFileExcel').click(); }

            function prosesImportExcel(input) {
        const file = input.files[0];
        if (!file) return;

        const pembacaFile = new FileReader();
        pembacaFile.onload = function (e) {
            const teksKonten = e.target.result;
            let bulkArray = [];
            let tahunDitemukan = 2026, bulanDitemukan = 5; // Default Juni 2026
            const daftarBulanIndo = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
            let tanggalTerakhir = "", hariTerakhir = "";

            // ====== STRUKTUR PEMBACA 1: Jika File berformat Web Page (.html / .htm) ======
            if (teksKonten.includes("<table") || teksKonten.includes("<tr")) {
                const parser = new DOMParser(); 
                const dokumenTabel = parser.parseFromString(teksKonten, "text/html");
                const barisTabel = dokumenTabel.querySelectorAll("tr");
                
                barisTabel.forEach(tr => {
                    const teksTr = tr.innerText.toUpperCase();
                    if (teksTr.includes("BULAN :")) {
                        daftarBulanIndo.forEach((nama, idx) => { if (teksTr.includes(nama)) bulanDitemukan = idx; });
                        const matchY = teksTr.match(/\d{4}/); if (matchY) tahunDitemukan = parseInt(matchY);
                    }
                });

                barisTabel.forEach((tr, index) => {
                    const kolom = tr.querySelectorAll("td, th");
                    const teksTr = tr.innerText.toUpperCase();
                    if (kolom.length < 5 || teksTr.includes("TGL") || teksTr.includes("BULAN :") || teksTr.includes("KEGIATAN") && teksTr.includes("HARI")) return;

                    let tglRaw = kolom[0] ? kolom[0].innerText.trim() : "";
                    let hariRaw = kolom[1] ? kolom[1].innerText.trim() : "";
                    let jam = kolom[2] ? kolom[2].innerText.replace(/⏰/g, "").trim() : "";
                    let kegiatan = kolom[3] ? kolom[3].innerText.trim() : "";
                    let pemateri = kolom[4] ? kolom[4].innerText.replace(/👤/g, "").trim() : "";
                    let lokasi = kolom[5] ? kolom[5].innerText.replace(/📍/g, "").trim() : "";

                    if (kegiatan === "" || kegiatan.toLowerCase() === "kegiatan" || tglRaw.includes("Tidak ada agenda")) return;

                    if (tglRaw !== "") tanggalTerakhir = tglRaw;
                    if (hariRaw !== "") hariTerakhir = hariRaw;

                    const isRutin = tanggalTerakhir.toLowerCase().includes("rutin") || tanggalTerakhir.includes("🔄") || ["SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU", "MINGGU"].includes(tanggalTerakhir.toUpperCase());
                    let tanggalFinal = "";
                    if (!isRutin) {
                        if (tanggalTerakhir.includes("/")) {
                            const p = tanggalTerakhir.split("/");
                            if (p.length === 3) tanggalFinal = `${p[2]}-${p[1]}-${p[0]}`;
                        } else if (tanggalTerakhir.includes("-")) {
                            const p = tanggalTerakhir.split("-");
                            if (p.length === 3) tanggalFinal = p[0].length === 4 ? tanggalTerakhir : `${p[2]}-${p[1]}-${p[0]}`;
                        } else if (!isNaN(tanggalTerakhir) && tanggalTerakhir !== "") {
                            tanggalFinal = `${tahunDitemukan}-${String(bulanDitemukan + 1).padStart(2, '0')}-${String(parseInt(tanggalTerakhir)).padStart(2, '0')}`;
                        }
                    }

                    let hariFinal = hariTerakhir;
                    if(hariTerakhir !== "") {
                        let hariBersih = hariTerakhir.replace("Setiap ", "");
                        hariFinal = hariBersih.charAt(0).toUpperCase() + hariBersih.slice(1).toLowerCase();
                    }

                    bulkArray.push({ id: (Date.now() + index + Math.random()).toString(), isRutin: isRutin, tanggal: isRutin ? "" : tanggalFinal, hariRutin: isRutin ? hariFinal : "", jam: jam === "-" ? "" : jam, kegiatan: kegiatan, pemateri: pemateri === "-" ? "" : pemateri, lokasi: lokasi === "-" ? "" : lokasi, selesai: tr.classList.contains("selesai") });
                });
            } 
            // ====== STRUKTUR PEMBACA 2: Jika File berformat Teks Ringan CSV (*.csv) ======
            else {
                const barisData = teksKonten.split("\n");
                
                // Cari apakah ada baris "BULAN :" di 5 baris pertama CSV
                for(let i=0; i<Math.min(5, barisData.length); i++) {
                    const txt = barisData[i].toUpperCase();
                    if(txt.includes("BULAN :")) {
                        daftarBulanIndo.forEach((nama, idx) => { if (txt.includes(nama)) bulanDitemukan = idx; });
                        const matchY = txt.match(/\d{4}/); if (matchY) tahunDitemukan = parseInt(matchY);
                    }
                }

                for (let i = 1; i < barisData.length; i++) {
                    const barisBersih = barisData[i].trim();
                    if (barisBersih === "" || barisBersih.toUpperCase().includes("TGL") || barisBersih.toUpperCase().includes("BULAN :")) continue;

                    // Pecah kolom CSV berdasarkan koma atau titik koma bawaan Excel regional Indo
                    let kolom = barisBersih.split(/[,;]/);
                    kolom = kolom.map(val => val.replace(/^["']|["']$/g, '').trim());

                    if (kolom.length < 5) continue;

                    let tglRaw = kolom[0] || "";
                    let hariRaw = kolom[1] || "";
                    let jam = kolom[2] ? kolom[2].replace(/⏰/g, "").trim() : "";
                    let kegiatan = kolom[3] || "";
                    let pemateri = kolom[4] ? kolom[4].replace(/👤/g, "").trim() : "";
                    let lokasi = kolom[5] ? kolom[5].replace(/📍/g, "").trim() : "";

                    if (kegiatan === "" || kegiatan.toLowerCase() === "kegiatan") continue;

                    if (tglRaw !== "") tanggalTerakhir = tglRaw;
                    if (hariRaw !== "") hariTerakhir = hariRaw;

                    const isRutin = tanggalTerakhir.toLowerCase().includes("rutin") || ["SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU", "MINGGU"].includes(tanggalTerakhir.toUpperCase());
                    let tanggalFinal = "";
                    if (!isRutin) {
                        if (tanggalTerakhir.includes("/")) {
                            const p = tanggalTerakhir.split("/");
                            if (p.length === 3) tanggalFinal = `${p[2]}-${p[1]}-${p[0]}`;
                        } else if (tanggalTerakhir.includes("-")) {
                            const p = tanggalTerakhir.split("-");
                            if (p.length === 3) tanggalFinal = p[0].length === 4 ? tanggalTerakhir : `${p[2]}-${p[1]}-${p[0]}`;
                        } else if (!isNaN(tanggalTerakhir) && tanggalTerakhir !== "") {
                            tanggalFinal = `${tahunDitemukan}-${String(bulanDitemukan + 1).padStart(2, '0')}-${String(parseInt(tanggalTerakhir)).padStart(2, '0')}`;
                        }
                    }

                    let hariFinal = hariTerakhir.charAt(0).toUpperCase() + hariTerakhir.slice(1).toLowerCase();

                    bulkArray.push({
                        id: (Date.now() + i + Math.random()).toString(),
                        isRutin: isRutin,
                        tanggal: isRutin ? "" : tanggalFinal,
                        hariRutin: isRutin ? hariFinal : "",
                        jam: jam === "-" ? "" : jam,
                        kegiatan: kegiatan,
                        pemateri: pemateri === "-" ? "" : pemateri,
                        lokasi: lokasi === "-" ? "" : lokasi,
                        selesai: false
                    });
                }
            }

            // Kirim massal ke Google Sheets cloud
            if(bulkArray.length > 0) {
                kirimDataKeCloud({ aksi: "import_bulk", dataArray: bulkArray });
                alert(`🚀 Sukses membaca berkas! Sedang menyetor ${bulkArray.length} data kegiatan ke Google Sheets, mohon tunggu sekitar 3 detik...`);
            } else {
                alert("Gagal membaca data! Pastikan Anda memilih file yang tepat.");
            }
            input.value = '';
        };
        pembacaFile.readAsText(file);
    }
    
</script>
